<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're Invited — Jayla Elise Greene</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Dancing+Script:wght@600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background: #e8e4dc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', Georgia, serif;
    padding: 2rem 1rem;
  }
  .curtain-wrap {
    position: relative;
    width: 100%;
    max-width: 500px;
    overflow: hidden;
  }
  .curtain-left, .curtain-right {
    position: absolute;
    top: 0; width: 50%; height: 100%;
    background: #111;
    z-index: 10;
    transition: transform 1.6s cubic-bezier(0.77, 0, 0.18, 1);
  }
  .curtain-left { left: 0; }
  .curtain-right { right: 0; }
  .curtain-left::after, .curtain-right::after {
    content: ''; position: absolute; top: 0; width: 5px; height: 100%;
    background: rgba(255,255,255,0.04);
  }
  .curtain-left::after { right: 0; }
  .curtain-right::after { left: 0; }
  .open .curtain-left { transform: translateX(-100%); }
  .open .curtain-right { transform: translateX(100%); }
  .cta-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 11;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; cursor: pointer;
  }
  .cta-cap { animation: bob 2.4s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-9px);} }
  .cta-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.55);
    color: #fff;
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 12px 36px;
    cursor: pointer;
    transition: background 0.25s;
  }
  .cta-btn:hover { background: rgba(255,255,255,0.1); }
  .cta-hint {
    color: rgba(255,255,255,0.38);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-family: 'Cormorant Garamond', serif;
  }
  .invite {
    background: #faf8f3;
    border: 1px solid #ddd9ce;
    text-align: center;
    position: relative;
  }
  .invite-inner {
    margin: 14px;
    border: 0.5px solid #ccc9be;
    padding: 2.2rem 2rem 2rem;
  }
  .fade { opacity: 0; transition: opacity 0.7s ease, transform 0.7s ease; }
  .fade-up { transform: translateY(10px); }
  .open .fade { opacity: 1; transform: translateY(0); }
  .open .d1 { transition-delay: 1.7s; }
  .open .d2 { transition-delay: 2.1s; }
  .open .d3 { transition-delay: 2.3s; }
  .open .d4 { transition-delay: 2.45s; }
  .open .d5 { transition-delay: 2.7s; }
  .open .d6 { transition-delay: 3.0s; }
  .open .d7 { transition-delay: 3.3s; }
  .you-invited {
    font-family: 'Dancing Script', cursive;
    font-size: 2.6rem;
    color: #1a1a1a;
    margin-bottom: 1rem;
  }
  .thin-rule { width: 50px; height: 0.5px; background: #bbb; margin: 0 auto 1rem; }
  .reception-label {
    font-size: 0.63rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 0.35rem;
  }
  .honoree {
    font-family: 'Playfair Display', serif;
    font-size: 1.55rem;
    font-weight: 700;
    color: #111;
    letter-spacing: 0.04em;
    margin-bottom: 1.3rem;
    min-height: 2.2rem;
  }
  .when-block {
    font-style: italic;
    color: #2a2a2a;
    margin-bottom: 1.3rem;
    line-height: 1.75;
  }
  .when-block .main-date { font-size: 1.05rem; min-height: 1.6rem; }
  .when-block .sub { font-size: 0.86rem; color: #555; }
  .bottom-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.2rem;
  }
  .heels-img {
    flex: 0 0 110px;
    width: 110px;
    height: 110px;
    object-fit: contain;
  }
  .where-col { flex: 1; text-align: right; }
  .where-text {
    font-style: italic;
    font-size: 0.97rem;
    color: #2a2a2a;
    line-height: 1.75;
  }
  .rsvp-area {
    border-top: 0.5px solid #ddd9ce;
    padding-top: 1rem;
    margin-top: 0.3rem;
  }
  .rsvp-name { font-style: italic; font-size: 1rem; color: #2a2a2a; margin-bottom: 0.12rem; }
  .rsvp-phone { font-size: 0.9rem; color: #444; margin-bottom: 0.45rem; }
  .rsvp-deadline { font-style: italic; font-size: 0.78rem; color: #777; }
  .typewriter-cursor {
    display: inline-block;
    width: 2px; height: 1em;
    background: #1a1a1a;
    vertical-align: middle;
    animation: blink 0.7s step-end infinite;
    margin-left: 1px;
  }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
  .share-bar {
    margin-top: 1.5rem;
    display: none;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .share-btn {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 10px 24px;
    border: 1px solid #bbb;
    background: transparent;
    color: #444;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .share-btn:hover { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .copy-msg {
    font-size: 11px; color: #888; letter-spacing: 0.1em;
    text-align: center; margin-top: 8px; min-height: 16px;
    font-family: 'Cormorant Garamond', serif;
  }
  .cap-img { width: 150px; height: auto; }
</style>
</head>

<script>
function typeIt(el, text, speed, done) {
  let i = 0;
  const cur = document.createElement('span');
  cur.className = 'typewriter-cursor';
  el.innerHTML = ''; el.appendChild(cur);
  const t = setInterval(() => {
    el.insertBefore(document.createTextNode(text[i]), cur);
    i++;
    if (i >= text.length) {
      clearInterval(t);
      setTimeout(() => { cur.remove(); if (done) done(); }, 500);
    }
  }, speed);
}

function openIt() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('wrap').classList.add('open');
  setTimeout(() => {
    typeIt(document.getElementById('honoree'), 'JAYLA ELISE GREENE & FRIENDS', 48, () => {
      setTimeout(() => {
        typeIt(document.getElementById('dateline'), 'Wednesday, April 29, 2026  ·  6:00 – 10:00', 32);
      }, 200);
    });
  }, 2200);
  setTimeout(() => {
    const bar = document.getElementById('share-bar');
    bar.style.display = 'flex';
  }, 4500);
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    document.getElementById('copy-msg').textContent = 'Link copied!';
    setTimeout(() => document.getElementById('copy-msg').textContent = '', 2500);
  });
}

function shareNative() {
  if (navigator.share) {
    navigator.share({
      title: "You\'re Invited — Jayla Elise Greene",
      text: "You\'re invited to Jayla\'s Graduation Reception! April 29, 2026 · Von Braun Civic Center",
      url: window.location.href
    });
  } else {
    copyLink();
  }
}
</script>
